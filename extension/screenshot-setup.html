<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 800px;
    background: linear-gradient(135deg, #ede9ff 0%, #f5f3ff 40%, #e8f4ff 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    overflow: hidden;
  }
  .scene {
    display: flex;
    align-items: center;
    gap: 80px;
  }
  .copy { max-width: 380px; }
  .copy .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(86,69,212,.1);
    color: #5645d4;
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.2px;
    margin-bottom: 20px;
  }
  .copy h1 {
    font-size: 42px;
    font-weight: 700;
    color: #1d1d1f;
    line-height: 1.1;
    letter-spacing: -1px;
    margin-bottom: 16px;
  }
  .copy h1 span { color: #5645d4; }
  .copy p { font-size: 16px; color: #86868b; line-height: 1.6; }
  .popup-wrap {
    filter: drop-shadow(0 24px 64px rgba(86,69,212,.22)) drop-shadow(0 4px 16px rgba(0,0,0,.1));
    border-radius: 16px;
  }
  .popup { width: 340px; background: #f8f7ff; color: #1d1d1f; border-radius: 16px; overflow: hidden; }
  .header { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid rgba(86,69,212,.1); background: linear-gradient(135deg, #f3f0ff 0%, #fff 60%); }
  .logo-mark { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, #ede9ff, #f3f0ff); border: 1px solid rgba(86,69,212,.18); display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .logo-mark img { width: 30px; height: 30px; object-fit: contain; }
  .logo-text { flex: 1; }
  .logo-text h2 { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; color: #1d1d1f; }
  .logo-text p { font-size: 11px; color: #5645d4; margin-top: 1px; font-weight: 500; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #d1d1d6; }
  .body { padding: 16px; background: #f8f7ff; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; font-weight: 600; color: #86868b; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }
  .field input { width: 100%; padding: 9px 11px; border: 1px solid rgba(86,69,212,.2); border-radius: 8px; font-size: 13px; font-family: inherit; color: #1d1d1f; background: #fff; outline: none; }
  .field input.focused { border-color: #5645d4; box-shadow: 0 0 0 3px rgba(86,69,212,.12); }
  .field-hint { font-size: 11px; color: #aeaeb2; margin-top: 4px; line-height: 1.4; }
  .btn-primary { width: 100%; padding: 9px 14px; background: #5645d4; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; margin-top: 4px; box-shadow: 0 2px 8px rgba(86,69,212,.3); letter-spacing: -0.1px; }
</style>
</head>
<body>
<div class="scene">
  <div class="copy">
    <div class="badge">✦ Chrome Extension</div>
    <h1>Connect <span>Canvas</span> to Iris</h1>
    <p>Enter your Canvas domain and Iris ID — that's it. Iris handles the rest every morning.</p>
  </div>
  <div class="popup-wrap">
    <div class="popup">
      <div class="header">
        <div class="logo-mark"><img src="iris-mascot.png" alt="Iris"></div>
        <div class="logo-text"><h2>Iris</h2><p>Academic assistant</p></div>
        <div class="status-dot"></div>
      </div>
      <div class="body">
        <div class="field">
          <label>Canvas domain</label>
          <input class="focused" type="text" value="canvas.ucsc.edu">
        </div>
        <div class="field">
          <label>Iris User ID</label>
          <input type="text" placeholder="Find this on your Iris dashboard">
          <p class="field-hint">Go to your Iris dashboard → Chrome Extension to copy your ID.</p>
        </div>
        <button class="btn-primary">Connect Canvas</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
